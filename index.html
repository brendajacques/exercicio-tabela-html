<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas-IFRS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Sistema de notas do IFRS</h1>
    <table>
        <caption>Boletim Escolar - 2026</caption>
        <thead>
            <tr>
                <th class="disciplina-cabecalho">Disciplina</th>
                <th>1° Bimestre</th>
                <th>2° Bimestre</th>
                <th>3° Bimestre</th>
                <th>4° Bimestre</th>
                <th class="media-final-cabecalho">Média Final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="disciplina">Matemática</td>
                <td>8,0</td>
                <td>7,5</td>
                <td>9,0</td>
                <td>8,5</td>
                <td class="media-final">8,25</td>
            </tr>
            <tr>
                <td class="disciplina">Português</td>
                <td>7,0</td>
                <td>6,5</td>
                <td>8,0</td>
                <td>7,5</td>
                <td class="media-final">7,25</td>
            <tr>
                <td class="disciplina">História</td>
                <td>9,0</td>
                <td>8,0</td>
                <td>8,5</td>
                <td>9,0</td>
                <td class="media-final">8,63</td>
            <tr>
                <td class="disciplina">Ciências</td>
                <td>6,0</td>
                <td>7,0</td>
                <td>6,5</td>
                <td>7,5</td>
                <td class="media-final">6,75</td>
            </tr>
        </tbody>
        <tfoot class="footer">
            <tr>
                <td colspan="6" class="situacao">Situação: Aprovado</td>
            </tr>
            <tr>
                <td colspan="5" class="media-geral">Média Geral</td>
                <td class="media-final-nota">7,72</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
